<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event | EventLive</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .create-event-container {
            padding: 8rem 10% 4rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .create-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
        }

        .create-card h1 {
            font-size: 2rem;
            color: var(--secondary);
            margin-bottom: 2rem;
            font-weight: 700;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .preview-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .preview-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
    <!-- Authentication and Profile logic handled by app.js -->
</head>

<body>

    <nav>
        <a href="index.html" style="text-decoration: none;">
            <div class="logo">EventLive</div>
        </a>

        <div class="user-profile" id="profile-container">
            <a href="dashboard.html" class="my-tickets-link">My Tickets</a>
            <div class="profile-trigger" id="profile-trigger">
                <span id="user-display-name">User</span>
                <div class="avatar">
                    <img id="avatar-img" src="https://ui-avatars.com/api/?name=User&background=A855F7&color=fff"
                        alt="Avatar">
                </div>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" class="dropdown-arrow">
                    <path d="M2.5 4.5L6 8L9.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
            <div class="profile-dropdown" id="profile-dropdown">
                <div class="dropdown-header">
                    <p class="dropdown-user-name" id="dropdown-user-name">User Name</p>
                    <p class="dropdown-user-email">Premium Member</p>
                </div>
                <div class="dropdown-divider"></div>
                <a href="#" class="dropdown-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    My Profile
                </a>
                <a href="create-event.html" class="dropdown-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 5v14M5 12h14"></path>
                    </svg>
                    Create Event
                </a>
                <a href="#" class="dropdown-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                    Help Center
                </a>
                <a href="#" class="dropdown-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                        </path>
                    </svg>
                    Settings
                </a>
                <div class="dropdown-divider"></div>
                <a href="#" class="dropdown-item logout-item" id="logout-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Log Out
                </a>
                <a href="#" class="dropdown-item delete-item" id="delete-account-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 6h18"></path>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                    Delete Account
                </a>
            </div>
        </div>
    </nav>

    <main class="create-event-container">
        <div class="create-card">
            <h1>Host Your Event</h1>
            <form id="create-event-form">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>Event Title</label>
                        <input type="text" id="event-title" placeholder="e.g., Summer Music Fest" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" id="event-category" placeholder="e.g., Music & Arts" required>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="text" id="event-date" placeholder="e.g., March 25, 2026" required>
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="event-location" placeholder="e.g., Chennai, TN" required>
                    </div>
                    <div class="form-group">
                        <label>Ticket Price (Rupees)</label>
                        <input type="text" id="event-price" placeholder="e.g., ₹25.00" required>
                    </div>
                    <div class="form-group full-width">
                        <label>Image URL (Optional)</label>
                        <input type="text" id="event-image" placeholder="Default image will be used if empty">
                    </div>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="cta-btn primary-btn" style="flex: 2;">Publish Event</button>
                    <button type="button" class="preview-btn" style="flex: 1;">Preview</button>
                </div>
            </form>
        </div>
    </main>

    <footer style="padding: 4rem 10%; background: #000; text-align: center; border-top: 1px solid var(--glass-border);">
        <a href="index.html" style="text-decoration: none;">
            <div class="logo" style="margin-bottom: 2rem;">EventLive</div>
        </a>
        <p style="color: var(--text-muted); font-size: 0.9rem;">© 2026 EventLive Inc. All rights reserved. Crafted for
            the future of events.</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Page-specific logic: Handle Event Creation

            const form = document.getElementById('create-event-form');
            if (form) {
                form.addEventListener('submit', (e) => {
                    e.preventDefault();

                    const newEvent = {
                        id: Date.now(),
                        title: document.getElementById('event-title').value,
                        category: document.getElementById('event-category').value,
                        date: document.getElementById('event-date').value,
                        location: document.getElementById('event-location').value,
                        price: document.getElementById('event-price').value.startsWith('₹') ?
                            document.getElementById('event-price').value :
                            `₹${document.getElementById('event-price').value}`,
                        image: document.getElementById('event-image').value || 'images/hero_bg.png',
                        isLogo: false
                    };

                    const events = JSON.parse(localStorage.getItem('eventlive_events') || '[]');
                    events.unshift(newEvent);
                    localStorage.setItem('eventlive_events', JSON.stringify(events));

                    alert('Event Published Successfully!');
                    window.location.href = 'index.html';
                });
            }
        });
    </script>
</body>

</html>
